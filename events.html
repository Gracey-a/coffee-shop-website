<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events | Hivey's Brew</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="container navbar">
    <div class="logo">☕ Hivey'S Brew</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">Story</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="events.html" class="active">Events</a></li>
      <li><a href="index.html#contact">Visit</a></li>
      <li class="cart-icon" onclick="openCart()">
        🛒 <span class="cart-count" id="cartCount">0</span>
      </li>
    </ul>
  </div>
</header>

<main>
  <section class="page-hero">
    <div class="container">
      <h1>Upcoming Events</h1>
      <p>Join us for coffee, community, and creativity</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="events-grid" id="eventsGrid">
        <!-- Events will be loaded by JavaScript -->
      </div>
    </div>
  </section>

  <!-- Event Registration Modal -->
  <div id="eventModal" class="event-modal">
    <div class="event-modal-content">
      <span class="close-modal" onclick="closeEventModal()">&times;</span>
      <h2>Register for Event</h2>
      <form id="eventRegistrationForm">
        <input type="hidden" id="eventName">
        <input type="text" id="regName" placeholder="Your Name" required>
        <input type="email" id="regEmail" placeholder="Your Email" required>
        <input type="tel" id="regPhone" placeholder="Phone Number">
        <button type="submit">Register Now</button>
      </form>
      <div id="eventRegMessage"></div>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-content">
      <div class="footer-logo">
        <h3>Hivey's Brew</h3>
        <p>artisan coffee & soulful space</p>
      </div>
      <div class="social-links">
        <a href="#">Instagram</a>
        <a href="#">Pinterest</a>
        <a href="#">Spotify Playlist</a>
      </div>
    </div>
    <div class="copyright">
      © 2026 Hivey's Brew Roasters — Crafted with love ☕
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
